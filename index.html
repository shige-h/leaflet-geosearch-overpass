<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Leaflet GeoSearch</title>
	
	<!-- link rel="shortcut icon" type="image/x-icon" href="docs/images/favicon.ico" / -->

    <!-- leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- leaflet geosearch -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@4.4.0/dist/geosearch.css" integrity="sha256-p+jKGIZe6dprRIMUXUr2GApehNzk6FJ0I7SFU20mQVs=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet-geosearch@4.4.0/dist/bundle.min.js" integrity="sha256-8blmlZY4SVHTw9k4jVCjsHjG8nCUTUpooHUDPb2QV4k=" crossorigin=""></script>

	<!-- leaflet.contextmenu -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-contextmenu@1.4.0/dist/leaflet.contextmenu.css" integrity="sha256-HT+5744sTpD3WFRoUidHtHavpSbRwV0f/0munxLNKGU=" crossorigin=""/>
	<script src="https://unpkg.com/leaflet-contextmenu@1.4.0/dist/leaflet.contextmenu.min.js" integrity="sha256-I3zyDVArt4ZrRcCzTUp6OiNmD5KuDsZCvhG+yZt8lhE=" crossorigin=""></script>

    <!-- leaflet geosearch overpassProvider -->
	<script src="./overpassProvider.js"></script>

	<style>
		html, body {
			height: 100%;
			margin: 0;
		}
		.leaflet-container {
			height: 100%;
			width: 100%;
			max-width: 100%;
			max-height: 100%;
		}
	</style>

	
</head>
<body>



<div id="map" style="width: 100%; height: 100%;"></div>
<script>

	var lastLat = localStorage.getItem('lastLat') || 35.800542;
	var lastLng = localStorage.getItem('lastLng') || 139.469826;
    // Initialize the map
	const map = L.map('map',{
		contextmenu: false,
		contextmenuWidth: 180,
	});
	map.setView([lastLat, lastLng], 13);

    // Add a tile layer (OpenStreetMap)
	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 17,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	// Configure the GeoSearch control
	const provider = new overpassProvider({map: map});

	const searchControl = new GeoSearch.GeoSearchControl({
		provider: provider,
		style: 'bar', // Display style: 'bar' (default), 'button', 'minimal'
		showMarker: true, // Show a marker on the map
		showPopup: false, // Show a popup with the address
		marker: {
			// optional: add a custom marker icon
			icon: new L.Icon.Default(),
			draggable: false,
		},
		autoClose: true, // Automatically close the search results list on selection
		keepResult: true, // Keep the search result marker after the control is closed
		searchLabel: 'Enter address', // Placeholder text in the search bar
	});

    // Add the search control to the map
    map.addControl(searchControl);

	map.on('geosearch/showlocation', function(e) {
	  // console.log(e);
	});

	map.on('moveend', function() {
		console.log(map.getBounds());
		var bounds = map.getBounds();
		var south = bounds.getSouth();
		var west = bounds.getWest();
		var north = bounds.getNorth();
		var east = bounds.getEast();

	    var center = map.getCenter();
	    localStorage.setItem('lastLat', center.lat);
	    localStorage.setItem('lastLng', center.lng);
	});

</script>



</body>
</html>
